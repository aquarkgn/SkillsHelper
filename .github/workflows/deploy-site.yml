name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'packages/site/**'
      - 'build/build-site.mjs'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

# GitHub Pages 部署需要 pages: write 与 id-token: write
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只允许一次站点部署，新推送取消进行中的旧部署
concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm ci

      - name: 构建官网落地页
        run: npm run build:site

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传站点产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
