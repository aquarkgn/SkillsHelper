# SkillHelper 抖音首发短片的唯一事实来源。
schema_version: 2
brand: SkillHelper
campaign: DY-001
default_status: planned
asset_root: .hermes/plans/skillhelper-promotion/videos
status_flow: [planned, recorded, selected, edited, approved, published, measured]
videos:
  - id: DY-001
    title: 30 秒产品介绍
    objective: 让开发者在 30 秒内看懂 SkillHelper 解决什么问题、如何起作用、去哪里获取。
    duration_seconds: 30
    format: vertical-9x16
    main_cta: GitHub 搜 SkillHelper
    evidence:
      - type: command
        source: npm view skillhelper version dist-tags.latest --json
      - type: command
        source: skillhelper --version
      - type: product
        source: 真实本机扫描结果与搜索交互
    segments:
      - id: DY-001-A
        range_seconds: 0-3
        purpose: 痛点
        screen: 多个 AI 工具或目录之间的真实切换。
        subtitle: AI 技能越来越多，想找一个却翻半天？
      - id: DY-001-B
        range_seconds: 3-8
        purpose: 产品定义
        screen: 由真实扫描结果进入 SkillHelper 工作台首屏。
        subtitle: 把本机 AI 能力收进一个工作台。
      - id: DY-001-C
        range_seconds: 8-21
        purpose: 直接收益
        screen: 搜索一个预先验证有结果的关键词，展示筛选后的技能详情。
        subtitle: 搜一下，技能、插件和 MCP 配置都能找到。
      - id: DY-001-D
        range_seconds: 21-30
        purpose: 单一行动
        screen: GitHub 仓库页与一行安装命令。
        subtitle: 开源、本地运行。GitHub 搜 SkillHelper。
    recording_notes:
      - 连续录制产品演示；只在段落切换处剪切。
      - 关闭通知，隐藏账号、Token、私有路径与未脱敏配置。
      - 不展示固定扫描数量、Star 数或过期版本号。
      - 命令统一使用 skillhelper；录制当天复核 npm latest 与实际 UI。
    asset_paths:
      capture: .hermes/plans/skillhelper-promotion/videos/01-capture/DY-001_product-intro_9x16_YYYYMMDD_v01.mov
      selects: .hermes/plans/skillhelper-promotion/videos/02-selects/DY-001_product-intro_select_YYYYMMDD_v01.mov
      edit: .hermes/plans/skillhelper-promotion/videos/03-edit/DY-001_product-intro_edit_YYYYMMDD_v01.prproj
      export: .hermes/plans/skillhelper-promotion/videos/04-export/douyin/DY-001_product-intro_9x16_YYYYMMDD_v01.mp4
    acceptance:
      - 前三秒清楚讲出痛点。
      - 第八秒前出现真实产品界面。
      - 21 秒内完成一次可见的搜索到详情交互。
      - 结尾只保留 GitHub 搜 SkillHelper 这个动作。
